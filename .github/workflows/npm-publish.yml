# Publishes the SDK to npm for a given git tag.
# Manually triggered from the Actions tab (workflow_dispatch) — use it to publish a
# release whose npm publish was missed, or as a fallback if automated publishing fails.
# Requires `secrets.ADOBE_BOT_NPM_TOKEN` (npm automation token with publish access).
name: npm-publish
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v0.1.2)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  npm-publish:
    name: npm-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org/'
      - run: npm install
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
