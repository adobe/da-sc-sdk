# Manual rescue path for publishing the SDK to npm.
#
# The primary publish flow runs inside semantic-release in main.yaml; this
# workflow only fires for releases created by a real user identity (e.g. when
# you manually create or re-publish a release from the GitHub UI). GitHub
# releases authored by GITHUB_TOKEN do not trigger this event, so there is no
# double-publish race with the inline flow.
#
# Requires `secrets.ADOBE_BOT_NPM_TOKEN` (npm automation token with publish access).
name: npm-publish
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  npm-publish:
    name: npm-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org/'
      - run: npm install
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
